<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>

    <header class="popup-header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="header-text">
        <span class="header-title">AliExpress Switcher</span>
        <span class="header-sub">Global redirect manager</span>
      </div>
    </header>

    <main class="popup-body">

      <!-- Global mode toggle -->
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Global redirect</span>
          <span class="setting-desc">Auto-redirect regional AliExpress to your preferred version</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="global_mode" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>

      <div class="divider"></div>

      <!-- Country -->
      <div class="field-group">
        <label class="field-label" for="countries">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Ship to
        </label>
        <select class="field-select" id="countries" autocomplete="off"></select>
      </div>

      <!-- Currency -->
      <div class="field-group">
        <label class="field-label" for="currencies">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Currency
        </label>
        <select class="field-select" id="currencies" autocomplete="off"></select>
      </div>

      <!-- Language -->
      <div class="field-group">
        <label class="field-label" for="locales">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6 6-6"/><circle cx="12" cy="12" r="10"/></svg>
          Language
        </label>
        <select class="field-select" id="locales" autocomplete="off"></select>
      </div>

    </main>

    <footer class="popup-footer">
      <span id="message" class="footer-message"></span>
      <a id="github" href="#" class="footer-link" title="svtcore on GitHub" aria-label="GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
    </footer>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
